name: Linux Build

on:
  workflow_call:   # reusable: invoked by ci.yml (the orchestrator handles triggers + concurrency)

jobs:
  build-matrix:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-24.04, ubuntu-24.04-arm, ubuntu-26.04 ]
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true

      - name: prep runner
        run:
          sudo apt-get update ;
          sudo apt-get install -y zip cmake make gcc python3-pip python3-cffi python3-setuptools python3-wheel ;
      # 6.31 / 6.40 / 6.4.1 are build-only regression checks. 6.4.2 is the published C library.
      # build-642 is the default option, so non-6.4.2 steps must pass -Dbuild-642=OFF.
      - name: build static 6.31 release (check only)
        run:
          mkdir cmake-build-static-631-release ;
          cd cmake-build-static-631-release ;
          cmake -Dbuild-631=ON -Dbuild-642=OFF -Dstatic-cli=ON  -DCMAKE_INSTALL_PREFIX=/usr   .. ;
          cmake --build .  --config Release  ;
          sudo cmake --install . ;
          cd .. ;
          file /usr/bin/clipscli  ;
      - name: build dynamic 6.31 release (check only)
        run:
          mkdir cmake-build-dynamic-631-release ;
          cd cmake-build-dynamic-631-release ;
          cmake -Dbuild-631=ON -Dbuild-642=OFF -Dstatic-cli=OFF -DCMAKE_INSTALL_PREFIX=/usr .. ;
          cmake --build .  --config Release  ;
          sudo cmake --install . ;
          cd .. ;
          file /usr/bin/clipscli  ;
      - name: build clipspy-0.3.3
        run:
          cd clipspy-0.3.3 ;
          python3 setup.py bdist_wheel ;
      - name: build static 6.40 release (check only)
        run:
          mkdir cmake-build-static-640-release ;
          cd cmake-build-static-640-release ;
          cmake -Dbuild-640=ON -Dbuild-642=OFF -Dstatic-cli=ON  -DCMAKE_INSTALL_PREFIX=/usr .. ;
          cmake --build .  --config Release  ;
          sudo cmake --install . ;
          cd .. ;
          file /usr/bin/clipscli  ;
      - name: build dynamic 6.40 release (check only)
        run:
          mkdir cmake-build-dynamic-640-release ;
          cd cmake-build-dynamic-640-release ;
          cmake -Dbuild-640=ON -Dbuild-642=OFF -Dstatic-cli=OFF -DCMAKE_INSTALL_PREFIX=/usr .. ;
          cmake --build .  --config Release  ;
          ctest;
          sudo cmake --install . ;
          cd .. ;
          file /usr/bin/clipscli  ;
      - name: build clipspy-1.0.0
        run:
          cd clipspy-1.0.0 ;
          python3 setup.py bdist_wheel ;
          cd dist ;
          pip3 install --break-system-packages --upgrade --force-reinstall *.whl ;
          sudo ldconfig ;
          python3 -c "import clips" ;
      - name: build static 6.4.1 release (check only)
        run:
          mkdir cmake-build-static-641-release ;
          cd cmake-build-static-641-release ;
          cmake -Dbuild-641-6=ON -Dbuild-642=OFF -Dstatic-cli=ON  -DCMAKE_INSTALL_PREFIX=/usr .. ;
          cmake --build .  --config Release  ;
          sudo cmake --install . ;
          cd .. ;
          file /usr/bin/clipscli  ;
      - name: build dynamic 6.4.1 release (check only)
        run:
          mkdir cmake-build-dynamic-641-release ;
          cd cmake-build-dynamic-641-release ;
          cmake -Dbuild-641-6=ON -Dbuild-642=OFF -Dstatic-cli=OFF -DCMAKE_INSTALL_PREFIX=/usr .. ;
          cmake --build .  --config Release  ;
          ctest;
          sudo cmake --install . ;
          cd .. ;
          file /usr/bin/clipscli  ;
      # clipspy stays on 6.4.1 (imports against the 6.4.1 install just above, before 6.4.2 lands).
      - name: build clipspy-1.0.6
        run:
          cd clipspy-1.0.6 ;
          python3 setup.py bdist_wheel ;
          cd dist ;
          pip3 install --break-system-packages --upgrade --force-reinstall *.whl ;
          sudo ldconfig ;
          python3 -c "import clips" ;
      # 6.4.2 is the published C library (installed last so the release zip captures it).
      #
      # PACKAGING: the release zip is built from a DESTDIR-staged copy of the install,
      # not by listing paths under /usr. The prefix here is a real system directory, so
      # archiving it wholesale is not an option (unlike Windows, where C:\usr contains
      # only this project) -- and the old explicit file list silently omitted anything
      # added later. It missed runtime-loader entirely: libdispatcher, runtime-clips and
      # the runtime-loader headers were installed but never shipped.
      #
      # Staging captures whatever CMake installs, so new install() rules are picked up
      # automatically. The system install is kept as well, because the clipspy build
      # needs libclips discoverable via /usr/lib + ldconfig; the staged copy is an
      # extra, sudo-free install used only for packaging. `zip -y` stores the SOVERSION
      # symlinks as symlinks rather than duplicating the library three times and losing
      # the soname chain.
      #
      # ORDER MATTERS: the staged (unprivileged) install must run BEFORE the sudo one.
      # `cmake --install` writes install_manifest.txt into the BUILD directory, so a
      # sudo install first leaves that file owned by root and the staging install then
      # dies with "Permission denied". Do not swap these two lines.
      - name: build static 6.4.2 release
        run:
          mkdir cmake-build-static-642-release ;
          cd cmake-build-static-642-release ;
          cmake -Dbuild-642=ON -Dstatic-cli=ON  -DCMAKE_INSTALL_PREFIX=/usr .. ;
          cmake --build .  --config Release  ;
          DESTDIR=$GITHUB_WORKSPACE/stage-static-642 cmake --install . ;
          sudo cmake --install . ;
          cd .. ;
          mkdir -p release-artifacts ;
          cd stage-static-642 ;
          zip -r -y ../release-artifacts/clips-static-642-${{ matrix.os }}-${GITHUB_RUN_NUMBER}.zip usr ;
          cd .. ;
          file /usr/bin/clipscli  ;
      - name: build dynamic 6.4.2 release
        run:
          mkdir cmake-build-dynamic-642-release ;
          cd cmake-build-dynamic-642-release ;
          cmake -Dbuild-642=ON -Dstatic-cli=OFF -DCMAKE_INSTALL_PREFIX=/usr .. ;
          cmake --build .  --config Release  ;
          ctest;
          DESTDIR=$GITHUB_WORKSPACE/stage-dynamic-642 cmake --install . ;
          sudo cmake --install . ;
          cd .. ;
          mkdir -p release-artifacts ;
          cd stage-dynamic-642 ;
          zip -r -y ../release-artifacts/clips-642-${{ matrix.os }}-${GITHUB_RUN_NUMBER}.zip usr ;
          cd .. ;
          file /usr/bin/clipscli  ;
      - uses: actions/upload-artifact@v4
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          name: release-${{ matrix.os }}
          path: release-artifacts/*.zip
      - uses: actions/upload-artifact@v4
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          name: clipspy-1.0.6-wheel-${{ matrix.os }}
          path: clipspy-1.0.6/dist/*.whl
