name: Windows Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: set up MSVC dev environment
        # puts cl.exe / dumpbin.exe on PATH (not there by default on hosted runners)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: install python build deps
        run: python -m pip install --upgrade pip setuptools wheel cffi

      - name: build static 6.31 release
        run:
          Remove-Item -LiteralPath "c:/usr" -Force -Recurse -ErrorAction Ignore ;
          mkdir cmake-build-static-631-release ;
          cd cmake-build-static-631-release ;
          cmake -Dbuild-631=ON -Dbuild-641-6=OFF -Dstatic-cli=ON  -DCMAKE_INSTALL_PREFIX=c:\usr  -DCMAKE_WINDOWS_EXPORT_ALL_SYMBOLS=True .. ;
          cmake --build . --target ALL_BUILD --config Release  ;
          cmake --install . ;
          cd .. ;
          dumpbin /dependents C:/usr/bin/clipscli.exe  ;
      - name: build dynamic 6.31 release
        run:
          Remove-Item -LiteralPath "c:/usr" -Force -Recurse -ErrorAction Ignore ;
          mkdir cmake-build-dynamic-631-release ;
          cd cmake-build-dynamic-631-release ;
          cmake -Dbuild-631=ON -Dbuild-641-6=OFF -Dstatic-cli=OFF -DCMAKE_INSTALL_PREFIX=c:\usr  -DCMAKE_WINDOWS_EXPORT_ALL_SYMBOLS=True .. ;
          cmake --build . --target ALL_BUILD --config Release  ;
          cmake --install . ;
          cd .. ;
          dumpbin /dependents C:/usr/bin/clipscli.exe  ;
      - name: build clipspy-0.3.3
        run:
          cd clipspy-0.3.3 ;
          python setup.py bdist_wheel ;
      - name: build static 6.40 release
        run:
          Remove-Item -LiteralPath "c:/usr" -Force -Recurse -ErrorAction Ignore ;
          mkdir cmake-build-static-640-release ;
          cd cmake-build-static-640-release ;
          cmake -Dbuild-640=ON -Dbuild-641-6=OFF -Dstatic-cli=ON  -DCMAKE_INSTALL_PREFIX=c:\usr  -DCMAKE_WINDOWS_EXPORT_ALL_SYMBOLS=True .. ;
          cmake --build . --target ALL_BUILD --config Release  ;
          cmake --install . ;
          cd .. ;
          md -Force release-artifacts  ;
          powershell -C  "&  Compress-Archive -Path C:\usr -DestinationPath release-artifacts\clips-static-640-$env:GITHUB_RUN_NUMBER.zip " ;
          cd release-artifacts  ;
          dumpbin /dependents C:/usr/bin/clipscli.exe  ;
      - name: build dynamic 6.40 release
        run:
          Remove-Item -LiteralPath "c:/usr" -Force -Recurse -ErrorAction Ignore ;
          mkdir cmake-build-dynamic-640-release ;
          cd cmake-build-dynamic-640-release ;
          cmake -Dstatic-cli=OFF -Dbuild-640=ON -Dbuild-641-6=OFF -DCMAKE_INSTALL_PREFIX=c:\usr  -DCMAKE_WINDOWS_EXPORT_ALL_SYMBOLS=True .. ;
          cmake --build . --target ALL_BUILD --config Release  ;
          ctest;
          cmake --install . ;
          cd .. ;
          md -Force release-artifacts  ;
          powershell -C  "&  Compress-Archive -Path C:\usr -DestinationPath release-artifacts\clips-dynamic-640-$env:GITHUB_RUN_NUMBER.zip " ;
          cd release-artifacts  ;
          dumpbin /dependents C:/usr/bin/clipscli.exe  ;
      - name: build clipspy-1.0.0
        run:
          cd clipspy-1.0.0 ;
          python setup.py bdist_wheel ;
          dir dist ;
          pip uninstall -y clipspy ;
          pip install (Get-ChildItem dist/*.whl | Select-Object -ExpandProperty FullName) ;
          cd .. ;
          $clipsdir = python -c "import os, importlib.util; print(os.path.dirname(importlib.util.find_spec('clips').origin))" ;
          Copy-Item c:\usr\bin\clips.dll $clipsdir ;
          python -c "import clips" ;
      - uses: actions/upload-artifact@v4
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          name: release
          path: release-artifacts\
      - uses: actions/upload-artifact@v4
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          name: clipspy-1.0.0-wheel
          path: clipspy-1.0.0/dist/*.whl
