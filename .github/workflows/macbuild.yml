name: macOS Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  build-matrix:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macos-14 is deprecated (per actions/runner-images) but kept as a
        # regression leg during the transition; macos-26 is the current runner.
        # Both are Apple-Silicon (arm64) — this matrixes the macOS version.
        os: [ macos-14, macos-26, macos-26-intel ]
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true

      - name: set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: install python build deps
        run: python3 -m pip install --upgrade pip setuptools wheel cffi

      # NOTE: mac builds are dynamic-only. The static-cli path passes `-static`
      # linker flags, which macOS does not support (no static libc / crt0.o).
      # Prefix is /usr/local because /usr is SIP-protected and not writable.
      # build-642 is the default option, so non-6.4.2 steps pass -Dbuild-642=OFF.
      # 6.40 / 6.4.1 are build-only checks; 6.4.2 is the published C library.
      - name: build dynamic 6.40 release (check only)
        run: |
          mkdir cmake-build-dynamic-640-release
          cd cmake-build-dynamic-640-release
          cmake -Dbuild-640=ON -Dbuild-642=OFF -Dstatic-cli=OFF ..
          cmake --build . --config Release
          ctest

      - name: build dynamic 6.4.1 release (check only)
        run: |
          mkdir cmake-build-dynamic-641-release
          cd cmake-build-dynamic-641-release
          cmake -Dbuild-641-6=ON -Dbuild-642=OFF -Dstatic-cli=OFF -DCMAKE_INSTALL_PREFIX=/usr/local ..
          cmake --build . --config Release
          ctest
          sudo cmake --install .

      # clipspy stays on 6.4.1 (imports against the 6.4.1 install above, before 6.4.2 lands).
      - name: build clipspy-1.0.6
        run: |
          cd clipspy-1.0.6
          LIBRARY_PATH=/usr/local/lib python3 setup.py bdist_wheel
          ls dist
          pip3 install --upgrade --force-reinstall dist/*.whl
          cd ..
          DYLD_LIBRARY_PATH=/usr/local/lib python3 -c "import clips"

      # 6.4.2 is the published C library (installed last).
      - name: build dynamic 6.4.2 release
        run: |
          mkdir cmake-build-dynamic-642-release
          cd cmake-build-dynamic-642-release
          cmake -Dbuild-642=ON -Dstatic-cli=OFF -DCMAKE_INSTALL_PREFIX=/usr/local ..
          cmake --build . --config Release
          ctest
          sudo cmake --install .
          cd ..
          mkdir -p release-artifacts
          zip release-artifacts/clips-642-${{ matrix.os }}-${GITHUB_RUN_NUMBER}.zip /usr/local/bin/clipscli /usr/local/include/clips-642/*.h /usr/local/lib/libclips*
          file /usr/local/bin/clipscli

      - uses: actions/upload-artifact@v4
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          name: release-${{ matrix.os }}
          path: release-artifacts/*.zip
      - uses: actions/upload-artifact@v4
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          name: clipspy-1.0.6-wheel-${{ matrix.os }}
          path: clipspy-1.0.6/dist/*.whl

  # Aggregate the matrix legs into a single "build" status check. Branch
  # protection requires the context "build"; with a matrix each leg is reported
  # as "build (<os>)", so this job restores a stable, matrix-agnostic "build"
  # check that is green only when every leg succeeded.
  build:
    if: always()
    needs: build-matrix
    runs-on: ubuntu-latest
    steps:
      - name: Verify all matrix legs passed
        run: |
          if [ "${{ needs.build-matrix.result }}" != "success" ]; then
            echo "build-matrix result: ${{ needs.build-matrix.result }}"
            exit 1
          fi
