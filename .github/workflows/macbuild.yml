name: macOS Build

on:
  workflow_call:   # reusable: invoked by ci.yml (the orchestrator handles triggers + concurrency)

jobs:
  build-matrix:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macos-14 is deprecated (per actions/runner-images) but kept as a
        # regression leg during the transition; macos-26 is the current runner.
        # Both are Apple-Silicon (arm64) — this matrixes the macOS version.
        os: [ macos-14, macos-26, macos-26-intel ]
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true

      - name: set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: install python build deps
        run: python3 -m pip install --upgrade pip setuptools wheel cffi

      # NOTE: mac builds are dynamic-only. The static-cli path passes `-static`
      # linker flags, which macOS does not support (no static libc / crt0.o).
      # Prefix is /usr/local because /usr is SIP-protected and not writable.
      # build-642 is the default option, so non-6.4.2 steps pass -Dbuild-642=OFF.
      # 6.40 / 6.4.1 are build-only checks; 6.4.2 is the published C library.
      - name: build dynamic 6.40 release (check only)
        run: |
          mkdir cmake-build-dynamic-640-release
          cd cmake-build-dynamic-640-release
          cmake -Dbuild-640=ON -Dbuild-642=OFF -Dstatic-cli=OFF ..
          cmake --build . --config Release
          ctest

      - name: build dynamic 6.4.1 release (check only)
        run: |
          mkdir cmake-build-dynamic-641-release
          cd cmake-build-dynamic-641-release
          cmake -Dbuild-641-6=ON -Dbuild-642=OFF -Dstatic-cli=OFF -DCMAKE_INSTALL_PREFIX=/usr/local ..
          cmake --build . --config Release
          ctest
          sudo cmake --install .

      # clipspy stays on 6.4.1 (imports against the 6.4.1 install above, before 6.4.2 lands).
      - name: build clipspy-1.0.6
        run: |
          cd clipspy-1.0.6
          LIBRARY_PATH=/usr/local/lib python3 setup.py bdist_wheel
          ls dist
          pip3 install --upgrade --force-reinstall dist/*.whl
          cd ..
          DYLD_LIBRARY_PATH=/usr/local/lib python3 -c "import clips"

      # 6.4.2 is the published C library (installed last).
      #
      # PACKAGING: the release zip is built from a DESTDIR-staged copy of the install,
      # not by listing paths under /usr/local. The prefix here is a real system
      # directory, so archiving it wholesale is not an option (unlike Windows, where
      # C:\usr contains only this project) -- and the old explicit file list silently
      # omitted anything added later. It missed runtime-loader entirely: libdispatcher,
      # runtime-clips and the runtime-loader headers were installed but never shipped.
      #
      # Staging captures whatever CMake installs, so new install() rules are picked up
      # automatically. The system install is kept as well, because the clipspy build
      # needs libclips on the dyld path; the staged copy is an extra, sudo-free install
      # used only for packaging. `zip -y` stores the SOVERSION symlinks as symlinks
      # rather than duplicating the library and losing the soname chain.
      #
      # ORDER MATTERS: the staged (unprivileged) install must run BEFORE the sudo one.
      # `cmake --install` writes install_manifest.txt into the BUILD directory, so a
      # sudo install first leaves that file owned by root and the staging install then
      # dies with "Permission denied". Do not swap these two lines.
      - name: build dynamic 6.4.2 release
        run: |
          mkdir cmake-build-dynamic-642-release
          cd cmake-build-dynamic-642-release
          cmake -Dbuild-642=ON -Dstatic-cli=OFF -DCMAKE_INSTALL_PREFIX=/usr/local ..
          cmake --build . --config Release
          ctest
          DESTDIR="$GITHUB_WORKSPACE/stage-dynamic-642" cmake --install .
          sudo cmake --install .
          cd ..
          mkdir -p release-artifacts
          cd stage-dynamic-642
          zip -r -y ../release-artifacts/clips-642-${{ matrix.os }}-${GITHUB_RUN_NUMBER}.zip usr
          cd ..
          file /usr/local/bin/clipscli

      - uses: actions/upload-artifact@v4
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          name: release-${{ matrix.os }}
          path: release-artifacts/*.zip
      - uses: actions/upload-artifact@v4
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          name: clipspy-1.0.6-wheel-${{ matrix.os }}
          path: clipspy-1.0.6/dist/*.whl
